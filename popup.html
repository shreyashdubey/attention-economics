<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="te.css" />
    <style>
      body { width: 288px; }
      .device { padding: 14px 14px 16px; }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .brand { display: flex; align-items: baseline; gap: 8px; }
      .brand .m { font-size: 18px; }
      .brand .sub { font-size: 9px; }
      .pwr { display: flex; align-items: center; gap: 6px; }

      .screen { padding: 12px 12px; margin-bottom: 14px; }
      .screen .stat-line {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.04em;
        color: var(--screen-fg);
        margin-bottom: 10px;
      }
      .screen .badge { font-weight: 700; }
      .screen .badge.on { color: var(--te-orange); }
      .screen .badge.off { color: var(--screen-green); }
      .screen .today {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--screen-dim);
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        border-top: 1px solid #20222a;
        padding-top: 9px;
      }
      .screen .today b {
        font-family: var(--font-pixel);
        font-size: 20px;
        color: var(--screen-green);
        letter-spacing: 0;
      }
      .screen .emrow {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.05em;
        color: var(--screen-fg);
        margin-top: 10px;
        border-top: 1px solid #20222a;
        padding-top: 9px;
      }
      .screen .emrow .badge { font-weight: 700; color: var(--te-orange); }

      .knobs {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 2px 6px 14px;
      }
      .knob-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
      .knob-cell .te-label { font-size: 8px; }

      .ctrl {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--g3);
        padding-top: 13px;
        margin-bottom: 12px;
      }
      .ctrl .lbl { display: flex; flex-direction: column; gap: 2px; }
      .ctrl .lbl .t { font-family: var(--font-grotesk); font-size: 13px; font-weight: 700; }

      .actions { display: flex; }
      .actions .te-btn--ghost { flex: 1; padding: 11px; font-size: 11px; }

      .footer {
        margin-top: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="te-plate device">
      <span class="te-screw tl"></span><span class="te-screw tr"></span>
      <span class="te-screw bl"></span><span class="te-screw br"></span>

      <div class="topbar">
        <div class="brand">
          <span class="te-model m">FG&ndash;1</span>
          <span class="te-label sub">focus&nbsp;guard</span>
        </div>
        <div class="pwr">
          <span class="te-label">pwr</span>
          <span class="te-led green" id="pwrLed"></span>
        </div>
      </div>

      <div class="te-screen screen">
        <div class="stat-line" id="state">loading&hellip;</div>
        <div class="today" id="today"></div>
        <div class="emrow" id="emergency" style="display:none"></div>
      </div>

      <div class="knobs">
        <div class="knob-cell"><span class="te-knob blue" style="--rot:-120deg"></span><span class="te-label">site</span></div>
        <div class="knob-cell"><span class="te-knob green" style="--rot:-40deg"></span><span class="te-label">time</span></div>
        <div class="knob-cell"><span class="te-knob white" style="--rot:30deg"></span><span class="te-label">days</span></div>
        <div class="knob-cell"><span class="te-knob orange" style="--rot:110deg"></span><span class="te-label">mode</span></div>
      </div>

      <div class="ctrl">
        <div class="lbl">
          <span class="t">blocking</span>
          <span class="te-label">power&nbsp;switch</span>
        </div>
        <input type="checkbox" id="enabled" class="te-switch" />
      </div>

      <div class="actions">
        <button id="open" class="te-btn--ghost te-btn">open console</button>
      </div>

      <div class="footer">
        <span class="te-fig">fig.01 &mdash; control unit</span>
        <span class="te-fig">v1.1</span>
      </div>
    </div>
    <script src="arming.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
