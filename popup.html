<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 250px; margin: 0; padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #111827; color: #e5e7eb;
      }
      h2 { margin: 0 0 12px; font-size: 15px; }
      .state { font-size: 13px; color: #9ca3af; margin-bottom: 14px; line-height: 1.5; }
      .badge { font-weight: 600; }
      .badge.on { color: #f87171; }
      .badge.off { color: #34d399; }
      .today { font-size: 13px; margin-bottom: 14px; }
      .today b { color: #34d399; }
      .toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
      .row { display: flex; gap: 8px; }
      button {
        flex: 1; background: #1f2937; color: #e5e7eb; border: 1px solid #374151;
        padding: 9px; border-radius: 8px; font-size: 13px; cursor: pointer;
      }
      button:hover { background: #374151; }
    </style>
  </head>
  <body>
    <h2>Focus Guard</h2>
    <div class="state" id="state">Loading…</div>
    <div class="today" id="today"></div>
    <div class="toggle">
      <input type="checkbox" id="enabled" />
      <label for="enabled">Enabled</label>
    </div>
    <div class="row">
      <button id="stats">Progress</button>
      <button id="options">Settings</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
