<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Progress — Focus Guard</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f6f7f9; color: #111827; padding: 40px 20px;
      }
      .wrap { max-width: 620px; margin: 0 auto; }
      h1 { font-size: 22px; margin: 0 0 4px; }
      .sub { color: #6b7280; font-size: 14px; margin: 0 0 24px; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
      .stat {
        background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
        padding: 18px; text-align: center;
      }
      .stat .n { font-size: 28px; font-weight: 700; }
      .stat .l { color: #6b7280; font-size: 12px; margin-top: 4px; }
      .card {
        background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
        padding: 22px; margin-bottom: 18px;
      }
      .card h3 { margin: 0 0 16px; font-size: 15px; }
      .chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
      .bar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
      .bar .fill { width: 100%; background: #34d399; border-radius: 6px 6px 0 0; min-height: 3px; }
      .bar .d { color: #9ca3af; font-size: 11px; }
      .bar .v { color: #6b7280; font-size: 11px; }
      .note { color: #6b7280; font-size: 13px; line-height: 1.6; }
      .quote { font-size: 15px; line-height: 1.6; }
      @media (prefers-color-scheme: dark) {
        body { background: #0b0f17; color: #e5e7eb; }
        .stat, .card { background: #111827; border-color: #1f2937; }
        .sub, .stat .l, .bar .d, .bar .v, .note { color: #9ca3af; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Your progress</h1>
      <p class="sub">Every intercept is one rep. The reps are the point.</p>

      <div class="grid">
        <div class="stat"><div class="n" id="today">0</div><div class="l">intercepts today</div></div>
        <div class="stat"><div class="n" id="streak">0</div><div class="l">day streak</div></div>
        <div class="stat"><div class="n" id="reclaimed">0m</div><div class="l">est. time reclaimed</div></div>
      </div>

      <div class="card">
        <h3>Last 7 days</h3>
        <div class="chart" id="chart"></div>
      </div>

      <div class="card">
        <h3>What this is really measuring</h3>
        <p class="note" id="encourage"></p>
      </div>
    </div>
    <script src="stats.js"></script>
  </body>
</html>
