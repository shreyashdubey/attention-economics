<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="te.css" />
    <title>blocked — FG-1</title>
    <style>
      html, body { height: 100%; }
      body {
        background: #c9c9cd;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .unit {
        width: min(680px, 92vw);
        padding: 22px;
      }
      .unit-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .unit-top .brand { display: flex; align-items: baseline; gap: 12px; }
      .unit-top .brand .m { font-size: 26px; }
      .unit-top .te-label { font-size: 11px; }
      .leds { display: flex; gap: 8px; align-items: center; }
      .unit .te-fig { font-size: 10px; }

      .screen {
        padding: 40px 34px;
        text-align: center;
      }
      .tag-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 26px;
      }
      .tag-row .te-fig { color: var(--screen-dim); }
      .x { font-family: var(--font-pixel); font-size: 34px; color: var(--te-orange); }
      .headline {
        font-family: var(--font-pixel);
        font-size: 52px;
        letter-spacing: 0.02em;
        color: var(--screen-fg);
        margin: 10px 0 6px;
      }
      .site {
        font-family: var(--font-mono);
        font-weight: 700;
        text-transform: lowercase;
        letter-spacing: 0.06em;
        font-size: 20px;
        color: var(--te-orange);
        margin-bottom: 32px;
        word-break: break-all;
      }
      .readout {
        display: inline-block;
        border: 1px solid #23252e;
        padding: 12px 18px;
        margin-bottom: 26px;
      }
      .readout { padding: 14px 22px; }
      .readout .lbl {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--screen-dim);
        display: block;
        margin-bottom: 8px;
      }
      .readout #until {
        font-family: var(--font-pixel);
        font-size: 20px;
        color: var(--screen-green);
      }
      .msg {
        font-family: var(--font-grotesk);
        font-size: 16px;
        line-height: 1.7;
        color: #c8cad1;
        max-width: 440px;
        margin: 0 auto;
      }
      /* equaliser bars, animated */
      .eq { display: flex; gap: 4px; justify-content: center; height: 26px; align-items: flex-end; margin: 24px 0 6px; }
      .eq i {
        width: 5px;
        background: var(--screen-green);
        animation: eq 1.1s ease-in-out infinite;
      }
      .eq i:nth-child(2) { animation-delay: 0.15s; }
      .eq i:nth-child(3) { animation-delay: 0.3s; }
      .eq i:nth-child(4) { animation-delay: 0.45s; }
      .eq i:nth-child(5) { animation-delay: 0.6s; }
      .eq i:nth-child(6) { animation-delay: 0.75s; }
      .eq i:nth-child(7) { animation-delay: 0.2s; }
      @keyframes eq { 0%,100% { height: 5px; } 50% { height: 24px; } }

      .unit-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 18px;
      }
      #optionsLink {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--g6);
        text-decoration: none;
        border-bottom: 1px solid var(--g4);
      }
      #optionsLink:hover { color: var(--te-orange); border-color: var(--te-orange); }

      /* ---- boot-up motion ---- */
      @media (prefers-reduced-motion: no-preference) {
        @keyframes boot { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
        @keyframes screenOn { 0% { opacity: 0; } 7% { opacity: 0.55; } 11% { opacity: 0.15; } 22% { opacity: 1; } 100% { opacity: 1; } }
        .unit-top { animation: boot 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) both; }
        .te-screen.screen { animation: screenOn 0.7s steps(1, end) both; animation-delay: 0.1s; }
        .unit-bottom { animation: boot 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) both; animation-delay: 0.6s; }
        /* staggered reveal of screen contents */
        .x { animation: boot 0.45s ease both 0.30s; }
        .headline { animation: boot 0.45s ease both 0.38s; }
        .site { animation: boot 0.45s ease both 0.46s; }
        .readout { animation: boot 0.45s ease both 0.54s; }
        .msg { animation: boot 0.45s ease both 0.62s; }
        .eq { animation: boot 0.45s ease both 0.70s; }
      }
    </style>
  </head>
  <body>
    <div class="te-plate unit">
      <span class="te-screw tl"></span><span class="te-screw tr"></span>
      <span class="te-screw bl"></span><span class="te-screw br"></span>

      <div class="unit-top">
        <div class="brand">
          <span class="te-model m">FG&ndash;1</span>
          <span class="te-label">focus&nbsp;guard&nbsp;/&nbsp;block&nbsp;mode</span>
        </div>
        <div class="leds">
          <span class="te-led red"></span>
          <span class="te-led off"></span>
          <span class="te-led off"></span>
        </div>
      </div>

      <div class="te-screen screen">
        <div class="tag-row">
          <span class="te-fig">fig.02 &mdash; intercept</span>
          <span class="te-fig">status: held</span>
        </div>

        <div class="x">[ &times; ]</div>
        <div class="headline">BLOCKED</div>
        <div class="site" id="site">this site</div>

        <div class="readout">
          <span class="lbl">available again at</span>
          <span id="until">&mdash;&mdash;:&mdash;&mdash;</span>
        </div>

        <p class="msg">
          stay on the line. this'll still be here later &mdash; go do one hard,
          uncomfortable thing first.
        </p>

        <div class="eq">
          <i></i><i></i><i></i><i></i><i></i><i></i><i></i>
        </div>
      </div>

      <div class="unit-bottom">
        <span class="te-fig">FG&ndash;1 &middot; engineered focus</span>
        <a href="#" id="optionsLink">adjust schedule</a>
      </div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
