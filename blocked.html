<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="te.css" />
    <title>blocked — FG-1</title>
    <style>
      html, body { height: 100%; }
      body {
        background: #c9c9cd;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px 16px;
      }
      .unit { width: min(560px, 94vw); padding: 22px 24px 24px; }

      .unit-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .unit-top .brand { display: flex; align-items: baseline; gap: 12px; }
      .unit-top .brand .m { font-size: 26px; }
      .unit-top .te-label { font-size: 11px; }
      .leds { display: flex; gap: 8px; align-items: center; }

      /* zone header (matches console) */
      .zone { display: flex; align-items: center; gap: 12px; margin: 18px 0 18px; }
      .zone .te-label { font-size: 13px; letter-spacing: 0.2em; color: var(--g8); }
      .zone .line { flex: 1; height: 1px; background: var(--g3); }
      .zone .te-fig { font-size: 11px; }

      /* verdict — dark type on aluminum */
      .headline {
        font-family: var(--font-pixel);
        font-size: 44px;
        letter-spacing: 0.01em;
        color: var(--g8);
        line-height: 1;
        margin: 2px 0 14px;
      }
      .site-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
      .site-row .site {
        font-family: var(--font-mono);
        font-weight: 700;
        font-size: 18px;
        text-transform: lowercase;
        color: var(--te-orange);
        word-break: break-all;
      }
      .site-row .tag {
        font-family: var(--font-mono);
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--te-orange);
        border: 1px solid var(--te-orange);
        padding: 3px 6px;
      }

      /* the price — one contained OLED readout does the talking */
      .price { margin-bottom: 26px; }
      .price .lead {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.04em;
        color: var(--g6);
        margin-bottom: 12px;
        line-height: 1.6;
      }
      .price .lead #now { color: var(--g8); font-weight: 700; }
      .price-screen { padding: 0; }
      .price-body { padding: 22px 18px; text-align: center; }
      .price-body .hero {
        font-family: var(--font-pixel);
        font-size: 60px;
        line-height: 0.96;
        color: var(--te-orange);
        text-shadow: 0 0 22px rgba(254, 80, 0, 0.4);
      }
      .price-body .hero .u { font-size: 21px; color: var(--screen-fg); margin-left: 6px; }
      .price .foot {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--g7);
        line-height: 1.7;
        margin-top: 12px;
      }

      /* rotating line — dry, dark on aluminum */
      .creed {
        font-family: var(--font-grotesk);
        font-size: 19px;
        font-weight: 700;
        line-height: 1.45;
        color: var(--g8);
        margin: 0 0 26px;
        min-height: 50px;
      }

      /* track record — mini OLED readouts (matches console) */
      .record { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
      .record .ro { padding: 18px 10px; text-align: center; }
      .record .ro .n {
        font-family: var(--font-pixel);
        font-size: 30px;
        color: var(--screen-green);
        line-height: 1;
        margin-bottom: 10px;
      }
      .record .ro.accent .n { color: var(--te-orange); }
      .record .ro .l {
        font-family: var(--font-mono);
        font-size: 9px;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        color: var(--screen-dim);
      }

      .back {
        font-family: var(--font-mono);
        font-size: 13px;
        letter-spacing: 0.02em;
        color: var(--g6);
        line-height: 1.7;
      }
      .back #until { color: var(--te-orange); font-weight: 700; }

      .unit-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 22px;
      }
      .unit-bottom .te-fig { font-size: 10px; }
      #optionsLink {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--g6);
        text-decoration: none;
        border-bottom: 1px solid var(--g4);
      }
      #optionsLink:hover { color: var(--te-orange); border-color: var(--te-orange); }

      /* ---- boot-up motion ---- */
      @media (prefers-reduced-motion: no-preference) {
        @keyframes boot { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
        @keyframes screenOn { 0% { opacity: 0; } 7% { opacity: 0.55; } 11% { opacity: 0.15; } 22% { opacity: 1; } 100% { opacity: 1; } }
        .unit-top, .haz-top { animation: boot 0.45s cubic-bezier(0.2, 0.7, 0.2, 1) both; }
        .zone     { animation: boot 0.45s ease both 0.08s; }
        .headline { animation: boot 0.45s ease both 0.16s; }
        .site-row { animation: boot 0.45s ease both 0.24s; }
        .price-screen { animation: screenOn 0.7s steps(1, end) both 0.32s; }
        .price .lead, .price .foot { animation: boot 0.45s ease both 0.34s; }
        .creed    { animation: boot 0.45s ease both 0.46s; }
        .record   { animation: boot 0.45s ease both 0.54s; }
        .back     { animation: boot 0.45s ease both 0.62s; }
        .unit-bottom { animation: boot 0.45s ease both 0.7s; }
      }
    </style>
  </head>
  <body>
    <div class="te-plate unit">
      <span class="te-screw tl"></span><span class="te-screw tr"></span>
      <span class="te-screw bl"></span><span class="te-screw br"></span>

      <div class="unit-top">
        <div class="brand">
          <span class="te-model m">FG&ndash;1</span>
          <span class="te-label">focus&nbsp;guard&nbsp;/&nbsp;block&nbsp;mode</span>
        </div>
        <div class="leds">
          <span class="te-led red"></span>
          <span class="te-led off"></span>
          <span class="te-led off"></span>
        </div>
      </div>

      <span class="te-hazard te-hazard--strip te-hazard--live haz-top"></span>

      <div class="zone">
        <span class="te-label">intercept</span>
        <span class="line"></span>
        <span class="te-fig">fig.02 &mdash; held</span>
      </div>

      <div class="headline">NOT WORTH IT</div>
      <div class="site-row">
        <span class="site" id="site">this site</span>
        <span class="tag">time-sink</span>
      </div>

      <div class="price">
        <div class="lead">one visit &asymp; <span id="now">~12 min</span>. as a daily habit, that&rsquo;s:</div>
        <div class="te-screen price-screen">
          <span class="te-hazard te-hazard--edge te-hazard--live"></span>
          <div class="price-body">
            <div class="hero"><span id="hero">73</span><span class="u">h / yr</span></div>
          </div>
        </div>
        <div class="foot" id="priceFoot">&mdash;</div>
      </div>

      <p class="creed" id="creed">&mdash;</p>

      <div class="record">
        <div class="te-screen ro accent"><div class="n" id="siteCount">0&times;</div><div class="l">refused here</div></div>
        <div class="te-screen ro"><div class="n" id="streak">0</div><div class="l">day streak</div></div>
        <div class="te-screen ro"><div class="n" id="reclaimed">0m</div><div class="l">reclaimed</div></div>
      </div>

      <p class="back">
        it&rsquo;ll keep until <span id="until">&mdash;&mdash;:&mdash;&mdash;</span>. go do one hard thing first.
      </p>

      <div class="unit-bottom">
        <span class="te-fig">FG&ndash;1 &middot; engineered focus</span>
        <a href="#" id="optionsLink">adjust schedule</a>
      </div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
